<!--
Motion graphic: Pulse callout
Use case: glowing orange ring around a key word/value to draw the eye, used as an accent over A-roll
Slot: smaller overlay, can be positioned anywhere on screen, data-track-index=8 (above b-roll/captions)
Duration: 1-2s recommended
Customize: change the TEXT, position via inline style on the .mg-pulse div
-->
<style>
  .mg-pulse {
    position: absolute;
    display: flex;
    justify-content: center;
    align-items: center;
    pointer-events: none;
  }
  .mg-pulse-text {
    position: relative;
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 96px;
    font-weight: 900;
    color: #ff6b00;
    text-transform: uppercase;
    letter-spacing: 4px;
    padding: 24px 48px;
    z-index: 2;
    text-shadow: 0 0 30px rgba(255, 107, 0, 0.6);
  }
  .mg-pulse-ring {
    position: absolute;
    inset: 0;
    border: 6px solid #ff6b00;
    border-radius: 24px;
    opacity: 0;
    animation: mg-pulse-ring 1.2s ease-out forwards;
  }
  .mg-pulse-ring:nth-child(2) { animation-delay: 0.3s; }
  .mg-pulse-ring:nth-child(3) { animation-delay: 0.6s; }
  @keyframes mg-pulse-ring {
    0%   { opacity: 0.8; transform: scale(0.95); }
    100% { opacity: 0;   transform: scale(1.3); }
  }
</style>
<!-- Position via the inline style: top, left, width are tunable -->
<div class="clip mg-pulse" data-start="0" data-duration="1.5" data-track-index="8"
     style="z-index: 8; top: 800px; left: 240px; width: 600px; height: 200px;">
  <div class="mg-pulse-ring"></div>
  <div class="mg-pulse-ring"></div>
  <div class="mg-pulse-ring"></div>
  <div class="mg-pulse-text">FREE</div>
</div>
